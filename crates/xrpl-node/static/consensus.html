<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XRPL Consensus — Live Validator Agreement</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #060610; color: #c8d0dc; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; }

  #top-bar { padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #141828; background: #0a0a18; flex-shrink: 0; }
  #top-bar h1 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #0085FF; letter-spacing: 2px; text-shadow: 0 0 12px rgba(0,133,255,0.3); }
  #top-bar .tag { color: #3a4055; font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 400; margin-left: 10px; }
  #top-bar a { color: #2a3a5a; text-decoration: none; font-size: 11px; border: 1px solid #1a1a30; padding: 4px 12px; border-radius: 3px; }
  #top-bar a:hover { color: #0085FF; border-color: #0085FF; }
  #status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
  .connected { background: #0085FF; box-shadow: 0 0 8px #0085FF; animation: pulse 2s ease-in-out infinite; }
  .disconnected { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* Center area */
  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 24px; }

  /* Phase indicator */
  #phase { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 3px; transition: color 0.3s, text-shadow 0.3s; }
  .ph-open { color: #2a3a5a; }
  .ph-propose { color: #0085FF; text-shadow: 0 0 20px rgba(0,133,255,0.3); }
  .ph-validate { color: #ffd93d; text-shadow: 0 0 20px rgba(255,217,61,0.3); }
  .ph-accepted { color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.4); }

  /* Ledger number */
  #ledger { font-family: 'Orbitron', sans-serif; font-size: 48px; font-weight: 900; color: #0085FF; text-shadow: 0 0 24px rgba(0,133,255,0.2); transition: color 0.3s, text-shadow 0.3s; }
  #ledger.flash { color: #00C3FF; text-shadow: 0 0 40px rgba(0,195,255,0.5); }

  /* Stats line */
  #stats-line { display: flex; gap: 32px; font-size: 13px; color: #3a4a6a; }
  #stats-line .num { color: #7a9acc; font-weight: 700; font-size: 16px; }

  /* Validator grid */
  #grid-wrap { width: 100%; max-width: 700px; }
  #grid-label { font-size: 10px; color: #2a3a5a; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; text-align: center; }
  #grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
  .vnode { width: 16px; height: 16px; border-radius: 3px; background: #101020; border: 1px solid #1a1a2a; transition: all 0.3s; position: relative; cursor: default; }
  .vnode.proposed { background: #0050aa; border-color: #0085FF; box-shadow: 0 0 6px rgba(0,133,255,0.3); }
  .vnode.validated { background: #8a7a10; border-color: #ffd93d; box-shadow: 0 0 6px rgba(255,217,61,0.3); }
  .vnode.agreed { background: #0a6a3a; border-color: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,0.4); }
  .vnode .tooltip { display: none; position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1a1a30; border: 1px solid #2a2a40; border-radius: 4px; padding: 4px 8px; font-size: 9px; color: #7a9acc; white-space: nowrap; z-index: 10; }
  .vnode:hover .tooltip { display: block; }

  /* Legend */
  #legend { display: flex; gap: 20px; font-size: 11px; color: #3a4a6a; }
  #legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  /* Cycle timeline at bottom */
  #timeline { width: 100%; max-width: 700px; height: 36px; display: flex; align-items: flex-end; gap: 2px; }
  .tbar { flex: 1; border-radius: 2px 2px 0 0; transition: height 0.2s ease-out; min-width: 0; }
  .tbar.t-propose { background: #0085FF; }
  .tbar.t-validate { background: #ffd93d; }
  .tbar.t-close { background: #ff6b6b; box-shadow: 0 0 4px rgba(255,107,107,0.3); }

  #footer { padding: 8px 24px; font-size: 10px; color: #1a2040; text-align: right; border-top: 1px solid #141828; flex-shrink: 0; }
  #footer span { color: #2a3060; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="top-bar">
  <h1><span id="status" class="disconnected"></span>CONSENSUS MONITOR<span class="tag">TESTNET</span></h1>
  <a href="/">FEED VIEW</a>
</div>

<div id="main">
  <div id="phase" class="ph-open">CONNECTING</div>
  <div id="ledger">--</div>

  <div id="stats-line">
    <div>proposals <span class="num" id="s-prop">0</span></div>
    <div>validations <span class="num" id="s-val">0</span></div>
    <div>validators <span class="num" id="s-seen">0</span></div>
    <div>interval <span class="num" id="s-int">--</span>s</div>
  </div>

  <div id="grid-wrap">
    <div id="grid-label">VALIDATORS</div>
    <div id="grid"></div>
  </div>

  <div id="legend">
    <span><span class="dot" style="background:#101020;border:1px solid #1a1a2a;"></span>Idle</span>
    <span><span class="dot" style="background:#0050aa;"></span>Proposed</span>
    <span><span class="dot" style="background:#8a7a10;"></span>Validated</span>
    <span><span class="dot" style="background:#0a6a3a;"></span>Agreed</span>
  </div>

  <div id="timeline"></div>
</div>

<div id="footer">built with <span>Rust + tokio + OpenSSL + prost + axum</span> — from-scratch XRPL peer protocol</div>

<script>
const statusDot = document.getElementById('status');
const phaseEl = document.getElementById('phase');
const ledgerEl = document.getElementById('ledger');
const sProp = document.getElementById('s-prop');
const sVal = document.getElementById('s-val');
const sSeen = document.getElementById('s-seen');
const sInt = document.getElementById('s-int');
const grid = document.getElementById('grid');
const timeline = document.getElementById('timeline');

const validators = new Map(); // shortKey → {el, state, fullKey}
let roundProps = 0, roundVals = 0;
let phase = 'open';
let lastLedgerTime = null;

// Timeline: last 120 events
const TL_MAX = 120;
for (let i = 0; i < TL_MAX; i++) {
  const b = document.createElement('div');
  b.className = 'tbar';
  b.style.height = '0px';
  timeline.appendChild(b);
}
const tlHistory = [];

function getValidator(key) {
  if (!key) return null;
  const short = key.slice(0, 10);
  if (!validators.has(short)) {
    const el = document.createElement('div');
    el.className = 'vnode';
    el.innerHTML = `<div class="tooltip">${key.slice(0,20)}...</div>`;
    grid.appendChild(el);
    validators.set(short, { el, state: 'idle', fullKey: key });
    sSeen.textContent = validators.size;
  }
  return validators.get(short);
}

function setVState(key, state) {
  const v = getValidator(key);
  if (!v) return;
  v.state = state;
  v.el.className = 'vnode ' + state;
}

function resetAll() {
  for (const [, v] of validators) {
    v.state = 'idle';
    v.el.className = 'vnode';
  }
}

function addTimeline(type) {
  let cls = '', h = 0;
  if (type === 'Proposal') { cls = 't-propose'; h = 14; }
  else if (type === 'Validation') { cls = 't-validate'; h = 26; }
  else if (type === 'StatusChange') { cls = 't-close'; h = 36; }
  else return;
  tlHistory.push({ cls, h });
  if (tlHistory.length > TL_MAX) tlHistory.shift();
  const bars = timeline.children;
  for (let i = 0; i < TL_MAX; i++) {
    const e = tlHistory[i];
    if (e) { bars[i].className = 'tbar ' + e.cls; bars[i].style.height = e.h + 'px'; }
    else { bars[i].className = 'tbar'; bars[i].style.height = '0px'; }
  }
}

function handleEvent(ev) {
  addTimeline(ev.msg_type);

  if (ev.msg_type === 'Proposal') {
    roundProps++;
    sProp.textContent = roundProps;
    if (ev.validator) setVState(ev.validator, 'proposed');
    if (phase === 'open' || phase === 'accepted') {
      phase = 'propose';
      phaseEl.className = 'ph-propose';
      phaseEl.textContent = 'PROPOSING';
      roundVals = 0;
      sVal.textContent = '0';
      resetAll();
      if (ev.validator) setVState(ev.validator, 'proposed');
    }
  }
  else if (ev.msg_type === 'Validation') {
    roundVals++;
    sVal.textContent = roundVals;
    if (ev.validator) setVState(ev.validator, 'validated');
    if (phase !== 'validate') {
      phase = 'validate';
      phaseEl.className = 'ph-validate';
      phaseEl.textContent = 'VALIDATING';
    }
  }
  else if (ev.msg_type === 'StatusChange') {
    if (ev.detail && ev.detail.includes('ACCEPTED')) {
      phase = 'accepted';
      phaseEl.className = 'ph-accepted';
      phaseEl.textContent = 'CONSENSUS';
      for (const [, v] of validators) {
        if (v.state === 'validated' || v.state === 'proposed') {
          v.state = 'agreed';
          v.el.className = 'vnode agreed';
        }
      }
      setTimeout(() => {
        if (phase === 'accepted') { roundProps = 0; sProp.textContent = '0'; }
      }, 2000);
    } else if (ev.detail && ev.detail.includes('CLOSING')) {
      phaseEl.className = 'ph-propose';
      phaseEl.textContent = 'CLOSING';
    }
  }

  if (ev.ledger_seq) {
    const now = Date.now();
    if (lastLedgerTime) sInt.textContent = ((now - lastLedgerTime) / 1000).toFixed(1);
    lastLedgerTime = now;
    ledgerEl.textContent = ev.ledger_seq.toLocaleString();
    ledgerEl.classList.add('flash');
    setTimeout(() => ledgerEl.classList.remove('flash'), 500);
  }
}

const es = new EventSource('/events');
es.onopen = () => { statusDot.className = 'connected'; phaseEl.textContent = 'WAITING'; };
es.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch {} };
es.onerror = () => { statusDot.className = 'disconnected'; phaseEl.textContent = 'DISCONNECTED'; phaseEl.className = 'ph-open'; };
</script>
</body>
</html>
