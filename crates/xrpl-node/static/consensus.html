<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XRPL Consensus — Neural Network</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #040410; color: #c8d0dc; font-family: 'JetBrains Mono', monospace; }

  #nebula { position: fixed; top: 0; left: 0; width: 100%; height: 100%; filter: blur(80px); opacity: 0.2; z-index: 0; }
  #net { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  #ui { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; pointer-events: none; }
  #ui > * { pointer-events: auto; }

  #top-bar { padding: 8px 24px; display: flex; justify-content: space-between; align-items: center; background: rgba(4,4,16,0.7); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.03); }
  #top-bar h1 { font-family: 'Orbitron', sans-serif; font-size: 12px; color: #0085FF; letter-spacing: 2px; }
  .tag { color: #3a4055; font-size: 10px; font-family: 'JetBrains Mono', monospace; margin-left: 8px; }
  #top-bar nav { display: flex; gap: 6px; }
  #top-bar a { color: #3a4a6a; text-decoration: none; font-size: 10px; border: 1px solid rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 3px; }
  #top-bar a:hover { color: #0085FF; border-color: rgba(0,133,255,0.3); }
  #status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; }
  .connected { background: #0085FF; box-shadow: 0 0 6px #0085FF; }
  .disconnected { background: #ff4444; }

  #info { position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 15; text-align: center; pointer-events: none; }
  #phase { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 3px; transition: all 0.3s; }
  .ph-open { color: #2a3a5a; }
  .ph-propose { color: #0085FF; }
  .ph-validate { color: #ffd93d; }
  .ph-accepted { color: #00ff88; }
  #ledger { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: #0085FF; transition: all 0.3s; margin-top: 2px; }
  #ledger.flash { color: #00ff88; }
  #our-val { display: inline-block; font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700; color: #00ff88; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; margin-left: 12px; }
  #stats { display: flex; gap: 16px; font-size: 10px; color: #3a4a6a; margin-top: 4px; justify-content: center; }
  #stats .n { color: #6a8abb; font-weight: 700; }

  #bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 6px 24px; display: flex; justify-content: space-between; align-items: center; background: rgba(4,4,16,0.7); backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.03); }
  #legend { display: flex; gap: 14px; font-size: 9px; color: #3a4a6a; }
  .ldot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  #footer-text { font-size: 9px; color: #1a2040; }

  @media(prefers-reduced-motion:reduce) { #nebula,#net { display:none; } }
</style>
</head>
<body>
<canvas id="nebula"></canvas>
<canvas id="net"></canvas>

<div id="ui">
  <div id="top-bar">
    <h1><span id="status" class="disconnected"></span>CONSENSUS<span class="tag">MAINNET</span></h1>
    <nav><a href="/">HOME</a><a href="/consensus">CONSENSUS</a><a href="/peers">PEERS</a><a href="/dashboard">METRICS</a><a href="https://github.com/ilubxrp589/xrpl-validator" target="_blank">GITHUB</a></nav>
  </div>
</div>

<div id="info">
  <div id="phase" class="ph-open">CONNECTING</div>
  <div id="ledger">--</div>
  <div id="stats">
    <div>proposals <span class="n" id="s-prop">0</span></div>
    <div>validations <span class="n" id="s-val">0</span></div>
    <div>validators <span class="n" id="s-seen">0</span></div>
    <div>interval <span class="n" id="s-int">--</span>s</div>
  </div>
  <div id="fee-flash" style="font-family:'Orbitron',sans-serif;font-size:12px;color:#ff6b6b;opacity:0;transition:opacity 0.3s;margin-top:4px;letter-spacing:1px;"></div>
</div>

<div id="bottom-bar">
  <div id="legend">
    <span><span class="ldot" style="background:#0085FF"></span>Propose</span>
    <span><span class="ldot" style="background:#ffd93d"></span>Validate</span>
    <span><span class="ldot" style="background:#00ff88"></span>Consensus</span>
    <span style="margin-left:12px;border-left:1px solid #1a1a30;padding-left:12px"><span class="ldot" style="background:#0085FF"></span>Payment</span>
    <span><span class="ldot" style="background:#f59e0b"></span>OfferCreate</span>
    <span><span class="ldot" style="background:#ef4444"></span>OfferCancel</span>
    <span><span class="ldot" style="background:#a855f7"></span>TrustSet</span>
    <span><span class="ldot" style="background:#14b8a6"></span>AccountSet</span>
    <span id="our-val">VALIDATED</span>
  </div>
  <div id="footer-text">Rust + tokio + OpenSSL + prost + axum</div>
</div>

<script>
const nebCvs = document.getElementById('nebula');
const nebCtx = nebCvs.getContext('2d');
const cvs = document.getElementById('net');
const ctx = cvs.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  nebCvs.width = W * 0.5; nebCvs.height = H * 0.5;
  nebCvs.style.width = W + 'px'; nebCvs.style.height = H + 'px';
  cvs.width = W * dpr; cvs.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}
window.addEventListener('resize', resize);

const statusDot = document.getElementById('status');
const phaseEl = document.getElementById('phase');
const ledgerEl = document.getElementById('ledger');
const sProp = document.getElementById('s-prop');
const sVal = document.getElementById('s-val');
const sSeen = document.getElementById('s-seen');
const sInt = document.getElementById('s-int');

let roundProps = 0, roundVals = 0, phase = 'open', lastLedgerTime = null, lastLedgerSeq = null;
let tabHidden = false;

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    tabHidden = true;
  } else {
    // Tab is back — flush all accumulated visual state
    tabHidden = false;
    pulses.length = 0;
    for (const [, node] of nodes) node.fireTime = 0;
    lastT = performance.now();
  }
});

// Nebula
const blobs = [];
function initNebula() {
  const colors = [[0,40,140],[50,0,140],[0,80,160],[40,0,80],[0,60,180]];
  for (let i = 0; i < 5; i++) {
    blobs.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.2, r: 150+Math.random()*200, color: colors[i%colors.length] });
  }
}
function renderNebula() {
  const nw = nebCvs.width, nh = nebCvs.height, sx = nw/W, sy = nh/H;
  nebCtx.clearRect(0, 0, nw, nh);
  for (const b of blobs) {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -100 || b.x > W+100) b.vx *= -1;
    if (b.y < -100 || b.y > H+100) b.vy *= -1;
    const g = nebCtx.createRadialGradient(b.x*sx, b.y*sy, 0, b.x*sx, b.y*sy, b.r*sx);
    g.addColorStop(0, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.7)`);
    g.addColorStop(1, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0)`);
    nebCtx.fillStyle = g;
    nebCtx.fillRect(0, 0, nw, nh);
  }
}

// Neural nodes
const nodes = new Map(); // key → {x, y, targetX, targetY, state, fireTime, connections[]}
let nodeCount = 0;

// Pulses traveling along connections
const pulses = []; // {fromNode, toNode, progress, color[]}

function getNode(key) {
  if (!key) return null;
  const short = key.slice(0, 10);
  if (!nodes.has(short)) {
    nodes.set(short, {
      x: W/2, y: H/2, z: 0, targetX: 0, targetY: 0, targetZ: 0,
      state: 'idle', fireTime: 0,
      connections: [],
    });
    nodeCount++;
    sSeen.textContent = nodeCount;
    layoutNodes();
    buildConnections();
  }
  return nodes.get(short);
}

function layoutNodes() {
  const margin = 80;
  const keys = [...nodes.keys()];
  const total = keys.length || 1;

  // Spread nodes across the screen in an organic mesh
  // Use a combination of circle + noise for brain-like placement
  const cx = W / 2, cy = H / 2;
  const rx = (W - margin * 2) * 0.45;
  const ry = (H - margin * 2) * 0.40;

  for (let i = 0; i < keys.length; i++) {
    const node = nodes.get(keys[i]);
    const angle = (i / total) * Math.PI * 2;
    const layer = 0.5 + (i % 3) * 0.25;
    const jitterX = Math.sin(i * 13.7) * 35;
    const jitterY = Math.cos(i * 17.3) * 25;
    node.targetX = cx + Math.cos(angle) * rx * layer + jitterX;
    node.targetY = cy + Math.sin(angle) * ry * layer + jitterY;
    // Z depth: -1 (far) to +1 (close), spread across full range
    node.targetZ = Math.sin(i * 7.3) * 0.6 + Math.cos(i * 3.1) * 0.4;
  }
}

function buildConnections() {
  const keys = [...nodes.keys()];
  // Each node connects to 2-4 nearest neighbors
  for (const key of keys) {
    const node = nodes.get(key);
    node.connections = [];

    // Find nearest nodes
    const distances = [];
    for (const otherKey of keys) {
      if (otherKey === key) continue;
      const other = nodes.get(otherKey);
      const dx = node.targetX - other.targetX;
      const dy = node.targetY - other.targetY;
      distances.push({ key: otherKey, dist: Math.sqrt(dx*dx + dy*dy) });
    }
    distances.sort((a, b) => a.dist - b.dist);

    // Connect to 2-3 nearest (avoid too many connections)
    const connectCount = Math.min(2 + (key.charCodeAt(0) % 2), distances.length);
    for (let i = 0; i < connectCount; i++) {
      node.connections.push(distances[i].key);
    }
  }
}

// Fire a node — send pulses along connections
function fireNode(key, color) {
  const node = nodes.get(key);
  if (!node) return;
  node.fireTime = 1; // brightness timer

  for (const connKey of node.connections) {
    pulses.push({
      fromKey: key, toKey: connKey,
      progress: 0, speed: 1.5 + Math.random() * 1,
      r: color[0], g: color[1], b: color[2],
    });
  }
}

// Cascade — fire ALL nodes
function cascadeAll(color) {
  for (const [key, node] of nodes) {
    node.state = 'agreed';
    node.fireTime = 1.5;
    // Stagger pulses slightly for wave effect
    setTimeout(() => {
      for (const connKey of node.connections) {
        pulses.push({
          fromKey: key, toKey: connKey,
          progress: 0, speed: 2 + Math.random() * 1.5,
          r: color[0], g: color[1], b: color[2],
        });
      }
    }, Math.random() * 200);
  }
}

function resetNodes() {
  for (const [, node] of nodes) {
    node.state = 'idle';
  }
  // Slight rearrangement — nudge target positions
  for (const [, node] of nodes) {
    node.targetX += (Math.random() - 0.5) * 15;
    node.targetY += (Math.random() - 0.5) * 10;
    node.targetZ += (Math.random() - 0.5) * 0.2;
  }
}

// Render
let time = 0;
function render(dt) {
  time += dt;
  ctx.clearRect(0, 0, W, H);

  // Move nodes toward targets (smooth drift) including z
  for (const [, node] of nodes) {
    node.x += (node.targetX - node.x) * 0.03;
    node.y += (node.targetY - node.y) * 0.03;
    node.z += (node.targetZ - node.z) * 0.03;
    if (node.fireTime > 0) node.fireTime -= dt * 1.5;
  }

  // Z-depth scale helper: z ranges -1 to +1, returns scale factor
  // +1 (close) = 1.6x, 0 (mid) = 1.0x, -1 (far) = 0.5x
  // z: -1 (far) to +1 (close). Far = tiny + dim, close = big + bright
  function zScale(z) { return 0.3 + (z + 1) * 0.7; }  // 0.3x far → 1.7x close
  function zAlpha(z) { return 0.35 + (z + 1) * 0.325; } // 0.35 far → 1.0 close

  // Draw connections (dim lines)
  for (const [key, node] of nodes) {
    for (const connKey of node.connections) {
      const other = nodes.get(connKey);
      if (!other) continue;

      // Base dim connection
      const brightness = Math.max(node.fireTime, other.fireTime, 0);
      const alpha = 0.03 + brightness * 0.12;

      ctx.beginPath();
      ctx.moveTo(node.x, node.y);
      ctx.lineTo(other.x, other.y);
      const avgZ = (node.z + other.z) / 2;
      const lineAlpha = alpha * zAlpha(avgZ);
      ctx.strokeStyle = brightness > 0.5
        ? `rgba(${node.state === 'agreed' ? '0,255,136' : node.state === 'validated' ? '255,217,61' : '0,133,255'},${lineAlpha})`
        : `rgba(30,40,70,${lineAlpha})`;
      ctx.lineWidth = (0.5 + brightness * 1) * zScale(avgZ);
      ctx.stroke();
    }
  }

  // Draw pulses traveling along connections
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.progress += p.speed * dt;

    if (p.progress >= 1) {
      // Pulse arrived — fire the destination node subtly
      const dest = nodes.get(p.toKey);
      if (dest) dest.fireTime = Math.max(dest.fireTime, 0.3);
      pulses.splice(i, 1);
      continue;
    }

    const from = nodes.get(p.fromKey);
    const to = nodes.get(p.toKey);
    if (!from || !to) { pulses.splice(i, 1); continue; }

    const px = from.x + (to.x - from.x) * p.progress;
    const py = from.y + (to.y - from.y) * p.progress;
    const alpha = 1 - Math.abs(p.progress - 0.5) * 1.5; // fade at ends

    const pz = from.z + (to.z - from.z) * p.progress;
    const ps = zScale(pz);

    ctx.beginPath();
    ctx.arc(px, py, 3.5 * ps, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${Math.max(0, alpha) * 0.9 * zAlpha(pz)})`;
    ctx.fill();

    // Trail
    const tx = from.x + (to.x - from.x) * Math.max(0, p.progress - 0.08);
    const ty = from.y + (to.y - from.y) * Math.max(0, p.progress - 0.08);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = `rgba(${p.r},${p.g},${p.b},${Math.max(0, alpha) * 0.4 * zAlpha(pz)})`;
    ctx.lineWidth = 2 * ps;
    ctx.stroke();
  }

  // Sort nodes by z for proper depth ordering (far first, close on top)
  const sortedNodes = [...nodes.entries()].sort((a, b) => a[1].z - b[1].z);

  // Draw nodes with 3D depth
  for (const [key, node] of sortedNodes) {
    const fire = Math.max(0, node.fireTime);
    const s = zScale(node.z);
    const za = zAlpha(node.z);
    let r, g, b, baseSize, alpha;

    if (node.state === 'agreed' || fire > 0.8) {
      const c = node.state === 'agreed' ? [0,255,136] : node.state === 'validated' ? [255,217,61] : [0,133,255];
      r = c[0]; g = c[1]; b = c[2];
      baseSize = 6 + fire * 3;
      alpha = (0.85 + fire * 0.15) * za;
    } else if (node.state === 'validated') {
      r = 255; g = 217; b = 61; baseSize = 5.5; alpha = 0.9 * za;
    } else if (node.state === 'proposed') {
      r = 0; g = 133; b = 255; baseSize = 5; alpha = 0.85 * za;
    } else {
      r = 40; g = 50; b = 80; baseSize = 3;
      alpha = (0.5 + Math.sin(time * 2 + node.x * 0.01) * 0.1) * za;
    }

    const size = baseSize * s;

    // Node orb
    ctx.beginPath();
    ctx.arc(node.x, node.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();
  }
}

let lastT = 0;
function loop(ts) {
  const rawDt = (ts - lastT) / 1000;
  lastT = ts;

  // If >0.5s gap (tab was backgrounded), flush all visual state
  if (rawDt > 0.5) {
    pulses.length = 0;
    for (const [, node] of nodes) node.fireTime = 0;
    renderNebula();
    render(0.016);
    requestAnimationFrame(loop);
    return;
  }

  const dt = Math.min(rawDt, 0.05);
  renderNebula();
  render(dt);
  requestAnimationFrame(loop);
}

// Tx type → color for neural network pulses
const txTypeColor = {
  Payment: [0, 133, 255],       // blue
  OfferCreate: [245, 158, 11],  // orange
  OfferCancel: [239, 68, 68],   // red
  TrustSet: [168, 85, 247],     // purple
  AccountSet: [20, 184, 166],   // teal
  AccountDelete: [255, 60, 60], // bright red
};

// Our validation flash
const ourVal = document.getElementById('our-val');
let ourValTimer = null;

// Track fees per round for the flash
let roundFees = 0;
const feeFlash = document.getElementById('fee-flash');
let feeFlashTimer = null;
let propsResetTimer = null;
let ledgerFlashTimer = null;

// Consensus events
function handleEvent(ev) {
  if (ev.msg_type === 'Proposal') {
    roundProps++; sProp.textContent = roundProps;
    if (phase === 'open' || phase === 'accepted') {
      phase = 'propose'; phaseEl.className = 'ph-propose'; phaseEl.textContent = 'PROPOSING';
      roundVals = 0; sVal.textContent = '0';
      roundFees = 0;
      resetNodes();
    }
    const node = getNode(ev.validator);
    if (node) { node.state = 'proposed'; if (!tabHidden) fireNode(ev.validator?.slice(0,10), [0,133,255]); }
  }
  else if (ev.msg_type === 'Validation') {
    roundVals++; sVal.textContent = roundVals;
    const node = getNode(ev.validator);
    if (node) { node.state = 'validated'; if (!tabHidden) fireNode(ev.validator?.slice(0,10), [255,217,61]); }
    if (phase !== 'validate') {
      phase = 'validate'; phaseEl.className = 'ph-validate'; phaseEl.textContent = 'VALIDATING';
    }
  }
  else if (ev.msg_type === 'Transaction') {
    // Color-code by transaction type
    if (ev.tx_info && !tabHidden) {
      const color = txTypeColor[ev.tx_info.tx_type] || [100, 100, 120];
      // Fire a random node with the tx-type color
      const keys = [...nodes.keys()];
      if (keys.length > 0) {
        const rk = keys[Math.floor(Math.random() * keys.length)];
        fireNode(rk, color);
      }
      roundFees += ev.tx_info.fee || 0;
    }
  }
  else if (ev.msg_type === 'OurValidation') {
    // Our node signed a validation — bright center flash
    if (!tabHidden) {
      // Fire ALL nodes bright green simultaneously
      for (const [k] of nodes) {
        fireNode(k, [0, 255, 180]);
      }
    }
    ourVal.style.opacity = '1';
    if (ourValTimer) clearTimeout(ourValTimer);
    ourValTimer = setTimeout(() => { ourVal.style.opacity = '0'; }, 1500);
  }
  else if (ev.msg_type === 'StatusChange') {
    if (ev.detail && ev.detail.includes('ACCEPTED') && phase !== 'accepted') {
      phase = 'accepted'; phaseEl.className = 'ph-accepted'; phaseEl.textContent = 'CONSENSUS';
      if (!tabHidden) cascadeAll([0, 255, 136]);

      // Fee burn flash
      if (roundFees > 0) {
        const xrp = (roundFees / 1000000);
        const xrpStr = xrp < 0.01 ? xrp.toFixed(6) : xrp.toFixed(4);
        feeFlash.innerHTML = '<span style="font-family:JetBrains Mono,monospace;font-size:12px;color:#ff6b6b">-' + xrpStr + ' XRP burned</span>';
        feeFlash.style.opacity = '1';
        if (feeFlashTimer) clearTimeout(feeFlashTimer);
        feeFlashTimer = setTimeout(() => { feeFlash.style.opacity = '0'; }, 2500);
      }

      if (propsResetTimer) clearTimeout(propsResetTimer);
      propsResetTimer = setTimeout(() => { if (phase === 'accepted') { roundProps = 0; sProp.textContent = '0'; } }, 2000);
    } else if (ev.detail && ev.detail.includes('CLOSING') && phase !== 'closing') {
      phase = 'closing'; phaseEl.className = 'ph-propose'; phaseEl.textContent = 'CLOSING';
    }
  }

  // Only update ledger number if it actually changed
  if (ev.ledger_seq && ev.ledger_seq !== lastLedgerSeq) {
    lastLedgerSeq = ev.ledger_seq;
    const now = Date.now();
    if (lastLedgerTime) sInt.textContent = ((now - lastLedgerTime) / 1000).toFixed(1);
    lastLedgerTime = now;
    ledgerEl.textContent = ev.ledger_seq.toLocaleString();
    ledgerEl.classList.add('flash');
    if (ledgerFlashTimer) clearTimeout(ledgerFlashTimer);
    ledgerFlashTimer = setTimeout(() => ledgerEl.classList.remove('flash'), 500);
  }
}

resize();
initNebula();
requestAnimationFrame(loop);

const es = new EventSource('/events');
es.onopen = () => { statusDot.className = 'connected'; phaseEl.textContent = 'WAITING'; phaseEl.className = 'ph-open'; };
es.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch {} };
es.onerror = () => { statusDot.className = 'disconnected'; phaseEl.textContent = 'DISCONNECTED'; phaseEl.className = 'ph-open'; };
</script>
</body>
</html>
